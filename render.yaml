services:
  - type: web
    name: meteor-madness
    env: python
    buildCommand: pip install -r requirements.txt ; python manage.py collectstatic --noinput ; python manage.py migrate
    startCommand: gunicorn meteor_madness_backend.wsgi:application --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: meteor-madness.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: NASA_API_KEY
        sync: false
